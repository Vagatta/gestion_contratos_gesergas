version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: contratos_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: contratos_db
      MARIADB_USER: contratos_user
      MARIADB_PASSWORD: contratos_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - contratos_network

  web:
    build: .
    container_name: contratos_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: contratos_db
      DB_NAME: contratos_db
      DB_USER: contratos_user
      DB_PASS: contratos_pass
      DB_CHARSET: utf8mb4
      APP_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - uploads_data:/var/www/html/uploads
      - ./config:/var/www/html/config:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - contratos_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: contratos_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: contratos_db
      PMA_PORT: 3306
      PMA_USER: contratos_user
      PMA_PASSWORD: contratos_pass
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - contratos_network

volumes:
  db_data:
  uploads_data:

networks:
  contratos_network:
    driver: bridge
